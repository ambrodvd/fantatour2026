<!doctype html><html lang="it"><head><meta charset="utf-8">
<title>Fantatour 2026™</title>
<style>/* ===== Fantasy League broadcast-style card system ===== */
:root{
  --navy-deep:#0b1e33;
  --navy-mid:#122c4a;
  --navy-light:#1c3f63;
  --yellow:#f4d21c;
  --yellow-deep:#e0b400;
  --ink:#eef3f8;
  --ink-dim:#9fb2c6;
  --line: rgba(255,255,255,0.10);
  --panel: rgba(255,255,255,0.045);
  --panel-strong: rgba(255,255,255,0.08);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:"DejaVu Sans","Helvetica Neue",Arial,sans-serif;
  background:
    radial-gradient(1200px 500px at 15% -10%, rgba(255,255,255,0.06), transparent 60%),
    linear-gradient(180deg,#0a1a2c 0%, #0d2338 35%, #123452 70%, #16466b 100%);
  color:var(--ink);
}

.condensed{ font-family:"DejaVu Sans Condensed","Arial Narrow",sans-serif; }

.stage{
  position:relative;
  width:100%;
  max-width:1180px;
  margin:0 auto;
  padding:36px 40px 44px;
  overflow:hidden;
}
@media(max-width:768px){
  .stage{ padding:24px 16px 32px; }
}

.mtn-svg{
  position:absolute; left:0; bottom:0; width:100%; height:210px; z-index:0; opacity:0.35;
}

.header{
  position:relative; z-index:2;
  display:flex; align-items:center; gap:22px;
  margin-bottom:26px;
}

.badge{
  width:76px; height:76px; border-radius:50%;
  background:var(--navy-deep);
  border:4px solid var(--yellow);
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  box-shadow:0 0 0 4px rgba(244,210,28,0.12);
}
.badge svg{width:42px;height:42px;}

.header-text .eyebrow{
  font-family:"DejaVu Sans Condensed",sans-serif;
  text-transform:uppercase;
  letter-spacing:0.14em;
  font-size:13px;
  color:var(--yellow);
  font-weight:700;
  margin:0 0 4px;
}
.header-text h1{
  margin:0;
  font-family:"DejaVu Sans Condensed",sans-serif;
  font-weight:700;
  font-size:30px;
  letter-spacing:0.01em;
  color:#fff;
  text-transform:uppercase;
}
.header-text .sub{
  margin:4px 0 0;
  font-size:15px;
  color:var(--ink-dim);
}

.sponsor{
  margin-left:auto;
  background:#fff;
  color:#0b1e33;
  font-family:"DejaVu Sans Condensed",sans-serif;
  font-weight:700;
  letter-spacing:0.03em;
  font-size:20px;
  padding:10px 20px;
  border-radius:6px;
  display:flex;
  align-items:center;
  gap:8px;
  box-shadow:0 6px 18px rgba(0,0,0,0.25);
}
.sponsor .dot{width:10px;height:10px;border-radius:50%;background:var(--yellow-deep);}

/* ===== Ranking table ===== */
.board{ position:relative; z-index:2; }

.row{
  display:grid;
  grid-template-columns: 46px 1fr auto;
  align-items:center;
  column-gap:16px;
  padding:9px 18px;
  border-radius:8px;
  margin-bottom:3px;
}
.row.alt{ background:var(--panel); }
.row.leader{
  background:linear-gradient(90deg, var(--yellow) 0%, var(--yellow-deep) 100%);
  color:#161200;
  box-shadow:0 4px 14px rgba(244,210,28,0.25);
  margin-bottom:6px;
}
.row.leader .pos{color:#161200;}
.row.leader .team{color:#161200;}
.row.leader .ds{color:#463b00;}
.row.leader .pts{color:#161200;}

.pos{
  font-family:"DejaVu Sans Condensed",sans-serif;
  font-weight:700;
  font-size:19px;
  color:#fff;
  text-align:center;
}
.team-block{ display:flex; flex-direction:column; min-width:0; }
.team{
  font-weight:700;
  font-size:16.5px;
  color:#fff;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.ds{
  font-size:12.5px;
  color:var(--ink-dim);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.pts-block{ display:flex; align-items:baseline; gap:10px; justify-content:flex-end; }
.pts{
  font-family:"DejaVu Sans Condensed",sans-serif;
  font-weight:700;
  font-size:20px;
  color:#fff;
  min-width:52px;
  text-align:right;
}
.pts-totale{
  background:var(--yellow) !important;
  color:#161200 !important;
  border-radius:6px;
  padding:2px 10px;
  min-width:52px;
}
.pts-piazz{
  background:#2fbf6a !important;
  color:#052914 !important;
  border-radius:6px;
  padding:2px 10px;
  min-width:52px;
}
.pts-label{
  font-size:10.5px;
  color:var(--ink-dim);
  text-transform:uppercase;
  letter-spacing:0.06em;
}
.split-cols{
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:14px 40px;
}

/* rider mini rows (card 3 & 4) */
.mini-row{
  display:grid;
  grid-template-columns:26px 1fr auto;
  padding:5px 10px;
  font-size:13.5px;
  border-radius:5px;
}
.mini-row.alt{ background:var(--panel); }
.mini-row .mpos{ color:var(--ink-dim); font-weight:700; font-family:"DejaVu Sans Condensed",sans-serif; }
.mini-row .mname{ color:#fff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.mini-row .mpts{ color:var(--yellow); font-weight:700; text-align:right; }

.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  padding:14px 16px 10px;
}
.panel h3{
  margin:0 0 10px;
  font-family:"DejaVu Sans Condensed",sans-serif;
  text-transform:uppercase;
  letter-spacing:0.06em;
  font-size:14px;
  color:var(--yellow);
  border-bottom:1px solid var(--line);
  padding-bottom:8px;
}

.section-title{
  font-family:"DejaVu Sans Condensed",sans-serif;
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-size:15px;
  color:var(--yellow);
  margin:26px 0 12px;
  padding-bottom:6px;
  border-bottom:1px solid var(--line);
}

.footer-note{
  margin-top:22px;
  font-size:11.5px;
  color:var(--ink-dim);
  text-align:right;
  position:relative; z-index:2;
}

/* ===== Card 4: team grid ===== */
.team-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:14px;
  position:relative; z-index:2;
}
.team-card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
}
.team-card.leader-card{
  border-color:var(--yellow-deep);
  box-shadow:0 0 0 1px rgba(244,210,28,0.35);
}
.team-card-head{
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 14px;
  background:var(--panel-strong);
}
.team-card.leader-card .team-card-head{
  background:linear-gradient(90deg,var(--yellow),var(--yellow-deep));
}
.team-card-head .tname{
  font-weight:700; font-size:14.5px; color:#fff;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.team-card.leader-card .tname{ color:#161200; }
.team-card-head .tpts{
  font-family:"DejaVu Sans Condensed",sans-serif;
  font-weight:700; font-size:17px; color:var(--yellow); flex-shrink:0; margin-left:8px;
}
.team-card.leader-card .tpts{ color:#161200; }
.team-card-ds{
  font-size:11px; color:var(--ink-dim); padding:6px 14px 0;
}
.team-card.leader-card .team-card-ds{ color:rgba(22,18,0,0.65); background:linear-gradient(90deg,var(--yellow),var(--yellow-deep)); padding-top:4px; padding-bottom:2px;}
.rider-list{ padding:8px 10px 10px; }
.rider-row{
  display:flex; justify-content:space-between; gap:8px;
  font-size:12.5px; padding:2.5px 6px; border-radius:4px;
}
.rider-row:nth-child(even){ background:rgba(255,255,255,0.035); }
.rider-row .rname{ color:#dbe6f0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rider-row .rpts{ color:var(--yellow); font-weight:700; flex-shrink:0; }
.rider-row.zero .rpts{ color:var(--ink-dim); font-weight:400; }

.menu-grid{
  position:relative; z-index:2;
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
  gap:14px;
  margin-top:10px;
}
.menu-card{
  display:block;
  text-decoration:none;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:12px;
  padding:22px 18px;
  text-align:center;
  transition:transform .15s ease, border-color .15s ease, background .15s ease;
}
.menu-card:hover{
  transform:translateY(-3px);
  border-color:var(--yellow-deep);
  background:var(--panel-strong);
}
.menu-card .tag{
  font-family:"DejaVu Sans Condensed",sans-serif;
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-size:12px;
  color:var(--yellow);
  font-weight:700;
  margin-bottom:6px;
}
.menu-card .tnum{
  font-family:"DejaVu Sans Condensed",sans-serif;
  font-weight:700;
  font-size:34px;
  color:#fff;
}

.cta-form{
  position:relative; z-index:2;
  display:flex; align-items:center; justify-content:center;
  gap:10px;
  margin-top:22px;
  width:100%;
  background:linear-gradient(90deg, var(--yellow) 0%, var(--yellow-deep) 100%);
  color:#161200;
  text-decoration:none;
  font-family:"DejaVu Sans Condensed",sans-serif;
  text-transform:uppercase;
  letter-spacing:0.05em;
  font-weight:700;
  font-size:17px;
  padding:16px 20px;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(244,210,28,0.3);
  transition:transform .15s ease, box-shadow .15s ease;
}
.cta-form:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 22px rgba(244,210,28,0.4);
}
.cta-form:active{
  transform:translateY(0);
}
@media(max-width:600px){
  .cta-form{
    font-size:15px;
    padding:16px 14px;
  }
}
</style></head>
